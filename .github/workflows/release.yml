name: Release

# Maintains the moving major-version tag (e.g. `v1`) that consumers pin to with
# `uses: sarveshacharya/k8s-rollout-guard@v1`. Push a full semver tag such as
# `v1.0.0` and this workflow (re)points `v1` at that commit — so the major tag
# always tracks the latest release and `@v1` keeps resolving.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'          # e.g. v1.0.0, v1.2.3 (ignores prereleases like v1.0.0-rc1)

permissions:
  contents: write                         # required to force-update the major tag

jobs:
  major-tag:
    name: Update major version tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Point major tag at this release
        run: |
          set -euo pipefail
          FULL="${GITHUB_REF_NAME}"        # the pushed tag, e.g. v1.2.3
          MAJOR="${FULL%%.*}"              # major only, e.g. v1
          echo "Pointing ${MAJOR} -> ${FULL} (${GITHUB_SHA})"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create or move the major tag to this commit and publish it.
          git tag -f "${MAJOR}" "${GITHUB_SHA}"
          git push -f origin "refs/tags/${MAJOR}"

          echo "::notice title=Major tag updated::${MAJOR} now points at ${FULL} (${GITHUB_SHA})"

      - name: Create/update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FULL="${GITHUB_REF_NAME}"
          if gh release view "${FULL}" >/dev/null 2>&1; then
            echo "Release ${FULL} already exists; leaving it as-is."
          else
            gh release create "${FULL}" \
              --title "${FULL}" \
              --generate-notes
          fi
